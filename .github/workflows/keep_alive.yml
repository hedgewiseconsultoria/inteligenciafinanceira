name: Keep Streamlit Alive

on:
  schedule:
    # executa a cada 10 minutos
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        run: |
          echo "Acessando app..."
          curl -L \
               --max-redirs 5 \
               --connect-timeout 10 \
               --max-time 30 \
               --silent \
               --output /dev/null \
               --write-out "HTTP Status: %{http_code}\n" \
               https://inteligenciafinanceira.streamlit.app/

      - name: Segundo acesso (keepalive)
        run: |
          echo "Segundo acesso..."
          curl -L \
               --max-redirs 5 \
               --connect-timeout 10 \
               --max-time 30 \
               --silent \
               --output /dev/null \
               --write-out "HTTP Status: %{http_code}\n" \
               "https://inteligenciafinanceira.streamlit.app/?keepalive=true"
